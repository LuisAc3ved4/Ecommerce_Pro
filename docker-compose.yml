services:
  mongo1: &mongo-base
    image: mongo:7.0
    container_name: mongo1
    command: ["--replSet", "rs-cluster", "--bind_ip_all"]
    #command: ["--replSet", "rs-cluster", "--keyFile", "/data/configdb/keyfile", "--bind_ip_all"]
    volumes:
      - ./mongo-config/mongo-keyfile:/data/configdb/keyfile:ro
      - ./data/db1:/data/db
    networks:
      - ecommerce-net

  mongo2:
    <<: *mongo-base
    container_name: mongo2
    volumes:
      - ./mongo-config/mongo-keyfile:/data/configdb/keyfile:ro
      - ./data/db2:/data/db

  mongo3:
    <<: *mongo-base
    container_name: mongo3
    volumes:
      - ./mongo-config/mongo-keyfile:/data/configdb/keyfile:ro
      - ./data/db3:/data/db

  ms-users:
    build: ./ms-users
    container_name: ms-users
    environment:
      - MONGO_URI=mongodb://mongo1:27017,mongo2:27017,mongo3:27017/users_db?replicaSet=rs-cluster
    depends_on:
      - mongo1
    networks:
      - ecommerce-net

  ms-inventory:
    build: ./ms-inventory
    container_name: ms-inventory
    environment:
      - MONGO_URI=mongodb://admin:secret@mongo1:27017,mongo2:27017,mongo3:27017/users_db?replicaSet=rs-cluster&authSource=admin
    depends_on:
      - mongo1
    networks:
      - ecommerce-net

  ms-reports:
    build: ./ms-reports
    container_name: ms-reports
    environment:
      - MONGO_URI=mongodb://admin:secret@mongo1:27017,mongo2:27017,mongo3:27017/users_db?replicaSet=rs-cluster&authSource=admin
    depends_on:
      - mongo1
    networks:
      - ecommerce-net

  nginx-gateway:
    image: nginx:latest
    container_name: nginx-gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ms-users
      - ms-inventory
      - ms-reports
    networks:
      - ecommerce-net

networks:
  ecommerce-net:
    driver: bridge
