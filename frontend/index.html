<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecommerce Pro - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .btn-primary { background: #2ecc71; border: none; }
        .btn-primary:hover { background: #27ae60; }
        .register-link { color: #2ecc71; text-decoration: none; font-weight: bold; }
        .register-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-card">
        <h3 class="text-center mb-4">🔐 Ecommerce Pro</h3>
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Correo Electrónico</label>
                <input type="email" id="email" class="form-control" placeholder="luis@example.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Ingresar al Sistema</button>
            
            <div id="mensaje" class="mt-3 text-center text-danger" style="min-height: 24px;"></div>
            
            <p class="mt-4 text-center small">
                ¿Eres nuevo administrador? <br>
                <a href="registro.html" class="register-link">Crea tu cuenta aquí</a>
            </p>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const mensajeDiv = document.getElementById('mensaje');

            mensajeDiv.innerText = "";

            try {
                const response = await fetch('/api/users/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const result = await response.json();

                if (response.ok) {
                    // --- NUEVAS LÍNEAS DE SESIÓN ---
                    localStorage.setItem('sesionActiva', 'true'); 
                    localStorage.setItem('usuarioNombre', result.name);
                    // -------------------------------
                    
                    window.location.href = "dashboard.html";
                } else {
                    mensajeDiv.innerText = result.msg || "Error al iniciar sesión";
                }
            } catch (error) {
                console.error("Error de conexión:", error);
                mensajeDiv.innerText = "No hay conexión con el servidor de usuarios";
            }
        });
    </script>
</body>
</html>
